<svg viewBox="0 0 680 130" width="100%" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>DiVo Gen²AI — Horizontal / Navbar Logo</title>
  <desc>Landscape lockup for website navigation bar</desc>
  <defs>
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C447C"/>
      <stop offset="50%" style="stop-color:#378ADD"/>
      <stop offset="100%" style="stop-color:#5DCAA5"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0C447C"/>
      <stop offset="50%" style="stop-color:#378ADD"/>
      <stop offset="100%" style="stop-color:#5DCAA5"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <linearGradient id="tagGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5DCAA5"/>
      <stop offset="100%" style="stop-color:#378ADD"/>
    </linearGradient>
  </defs>

  <g transform="translate(62, 65)" filter="url(#softGlow)">
    <path d="M -32 -36 L 12 -36 L 34 -16 L 34 16 L 12 36 L -32 36 L -32 22 L -2 22 L -2 -22 L -32 -22 Z"
          fill="none" stroke="url(#iconGrad)" stroke-width="3.5" stroke-linejoin="round"/>

    <line x1="12" y1="-22" x2="12" y2="-5" stroke="url(#iconGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="5" x2="12" y2="22" stroke="url(#iconGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="-2" y1="0" x2="12" y2="0" stroke="url(#iconGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="0" x2="24" y2="-15" stroke="url(#iconGrad)" stroke-width="2" stroke-linecap="round"/>
    <line x1="12" y1="0" x2="24" y2="15" stroke="url(#iconGrad)" stroke-width="2" stroke-linecap="round"/>

    <circle cx="12" cy="0" r="6.5" fill="url(#iconGrad)"/>
    <circle cx="24" cy="-15" r="3.8" fill="url(#iconGrad)"/>
    <circle cx="24" cy="15" r="3.8" fill="url(#iconGrad)"/>
    <circle cx="-2" cy="0" r="3.8" fill="url(#iconGrad)"/>
    <circle cx="12" cy="-22" r="3" fill="url(#iconGrad)"/>
    <circle cx="12" cy="22" r="3" fill="url(#iconGrad)"/>

    <circle cx="12" cy="0" r="3" fill="#FFFFFF"/>
  </g>

  <text x="135" y="72" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="52" font-weight="700" fill="url(#brandGrad)" letter-spacing="-2">DiVo</text>

  <text x="282" y="73" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="34" font-weight="500" fill="#0C447C" letter-spacing="5">
    Gen<tspan font-size="22" baseline-shift="super">2</tspan>AI
  </text>

  <circle cx="266" cy="63" r="3.5" fill="url(#tagGrad)"/>

  <line x1="135" y1="88" x2="500" y2="88" stroke="url(#tagGrad)" stroke-width="1" opacity="0.5"/>

  <text x="135" y="112" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13" font-weight="400" fill="#5F5E5A" letter-spacing="2.5">GENETIC × GENERATIVE INTELLIGENCE</text>
</svg>